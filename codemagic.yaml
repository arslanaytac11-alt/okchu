workflows:
  ios-capacitor-workflow:
    name: Okchu iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    # Auto-build on every push to main so fixes reach TestFlight without
    # needing a manual "Start new build" click. (Codemagic webhook must also
    # be enabled in the app's Repository settings for this to activate.)
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    integrations:
      app_store_connect: Okchu App Store Connect
    environment:
      groups:
        - okchu
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 6762461650
        BUNDLE_ID: "com.arslanaytac.okchu"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Rewrite admob ConsentExecutor for UMP 3.x API
        script: |
          FILE="node_modules/@capacitor-community/admob/ios/Sources/AdMobPlugin/Consent/ConsentExecutor.swift"
          # UMP 3.x dropped the UMP prefix on all types and renamed several
          # members. Rather than chase renames one-by-one via sed, replace the
          # entire file with a UMP 3.x compatible implementation.
          cat > "$FILE" <<'SWIFT_EOF'
          import Foundation
          import Capacitor
          import GoogleMobileAds
          import UserMessagingPlatform

          class ConsentExecutor: NSObject {
              weak var plugin: AdMobPlugin?

              func requestConsentInfo(_ call: CAPPluginCall, _ debugGeography: Int, _ testDeviceIdentifiers: [String], _ tagForUnderAgeOfConsent: Bool) {
                  let parameters = RequestParameters()
                  let debugSettings = DebugSettings()

                  debugSettings.geography = DebugGeography(rawValue: debugGeography) ?? DebugGeography.disabled
                  debugSettings.testDeviceIdentifiers = testDeviceIdentifiers

                  parameters.debugSettings = debugSettings
                  parameters.isTaggedForUnderAgeOfConsent = tagForUnderAgeOfConsent

                  ConsentInformation.shared.requestConsentInfoUpdate(
                      with: parameters,
                      completionHandler: { error in
                          if error != nil {
                              call.reject("Request consent info failed")
                          } else {
                              call.resolve([
                                  "status": self.getConsentStatusString(ConsentInformation.shared.consentStatus),
                                  "isConsentFormAvailable": ConsentInformation.shared.formStatus == FormStatus.available
                              ])
                          }
                      })
              }

              func showConsentForm(_ call: CAPPluginCall) {
                  if let rootViewController = plugin?.getRootVC() {
                      let formStatus = ConsentInformation.shared.formStatus

                      if formStatus == FormStatus.available {
                          ConsentForm.load(with: {form, loadError in
                              if loadError != nil {
                                  call.reject(loadError?.localizedDescription ?? "Load consent form error")
                                  return
                              }

                              if ConsentInformation.shared.consentStatus == ConsentStatus.required {
                                  form?.present(from: rootViewController, completionHandler: { dismissError in
                                      if dismissError != nil {
                                          call.reject(dismissError?.localizedDescription ?? "Consent dismiss error")
                                          return
                                      }

                                      call.resolve([
                                          "status": self.getConsentStatusString(ConsentInformation.shared.consentStatus)
                                      ])
                                  })
                              } else {
                                  call.resolve([
                                      "status": self.getConsentStatusString(ConsentInformation.shared.consentStatus)
                                  ])
                              }
                          })
                      } else {
                          call.reject("Consent Form not available")
                      }
                  } else {
                      call.reject("No ViewController")
                  }
              }

              func resetConsentInfo(_ call: CAPPluginCall) {
                  ConsentInformation.shared.reset()
                  call.resolve()
              }

              func getConsentStatusString(_ consentStatus: ConsentStatus) -> String {
                  switch consentStatus {
                  case ConsentStatus.required:
                      return "REQUIRED"
                  case ConsentStatus.notRequired:
                      return "NOT_REQUIRED"
                  case ConsentStatus.obtained:
                      return "OBTAINED"
                  default:
                      return "UNKNOWN"
                  }
              }
          }
          SWIFT_EOF
          echo "=== Rewrote $FILE ==="
          cat "$FILE"
      - name: Build web assets & sync Capacitor
        script: |
          npm run cap:sync
      - name: Generate language stubs for App Store Languages list
        script: |
          # The App Store sidebar's "Languages" list is driven by the .lproj
          # directories Apple finds inside the published .app bundle, NOT by
          # the CFBundleLocalizations Info.plist key alone. Create one
          # directory per supported locale with a minimal InfoPlist.strings
          # so Apple registers all 5 (en, tr, es, fr, ja) as supported.
          APP_DIR="ios/App/App"
          for lang in en tr es fr ja; do
            LPROJ="$APP_DIR/${lang}.lproj"
            mkdir -p "$LPROJ"
            printf '"CFBundleDisplayName" = "Okchu";\n"CFBundleName" = "Okchu";\n' > "$LPROJ/InfoPlist.strings"
          done
          # Add the new languages to the Xcode project's knownRegions list
          # via Python (pbxproj is plist-like; sed with multi-line + tabs
          # was not yaml-friendly). Idempotent: skips any language already
          # present so re-runs don't keep injecting.
          python3 <<'PYEOF'
          import re
          PBX = 'ios/App/App.xcodeproj/project.pbxproj'
          with open(PBX, 'r', encoding='utf-8') as f:
              src = f.read()
          # Match the knownRegions block: knownRegions = ( ... );
          m = re.search(r'(knownRegions\s*=\s*\()([^)]*)(\)\s*;)', src, re.DOTALL)
          if not m:
              print('knownRegions block not found, skipping')
              raise SystemExit(0)
          head, body, tail = m.group(1), m.group(2), m.group(3)
          existing = set(re.findall(r'\b([A-Za-z]{2,5})\b', body))
          for lang in ('en', 'tr', 'es', 'fr', 'ja'):
              if lang in existing:
                  continue
              # Insert before the closing paren, keep the indentation style
              # the project file already uses (tabs).
              body = body.rstrip() + '\n\t\t\t\t' + lang + ','
              existing.add(lang)
          new_block = head + body + '\n\t\t\t' + tail
          src2 = src[:m.start()] + new_block + src[m.end():]
          with open(PBX, 'w', encoding='utf-8') as f:
              f.write(src2)
          print('=== knownRegions now contains:', sorted(existing))
          PYEOF
      - name: Generate all iOS app icon sizes
        script: |
          # AppIcon.appiconset only has the 1024x1024 marketing icon.
          # iOS app icons need iPhone-specific sizes (60pt/40pt/29pt/20pt)
          # for asset catalog compilation + CFBundleIconName auto-injection
          # to work. Generate all required sizes from the 1024 source.
          ICONSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          SOURCE="$ICONSET/AppIcon-512@2x.png"
          if [ ! -f "$SOURCE" ]; then
            echo "ERROR: source icon missing at $SOURCE"; exit 1
          fi
          cd "$ICONSET"
          # Strip alpha channel just in case (marketing icon must be RGB)
          sips -s format png --deleteColorManagementProperties AppIcon-512@2x.png --out AppIcon-512@2x.png >/dev/null
          # iPhone icon sizes
          sips -z 120 120 AppIcon-512@2x.png --out Icon-60@2x.png >/dev/null
          sips -z 180 180 AppIcon-512@2x.png --out Icon-60@3x.png >/dev/null
          sips -z 80  80  AppIcon-512@2x.png --out Icon-40@2x.png >/dev/null
          sips -z 120 120 AppIcon-512@2x.png --out Icon-40@3x.png >/dev/null
          sips -z 58  58  AppIcon-512@2x.png --out Icon-29@2x.png >/dev/null
          sips -z 87  87  AppIcon-512@2x.png --out Icon-29@3x.png >/dev/null
          sips -z 40  40  AppIcon-512@2x.png --out Icon-20@2x.png >/dev/null
          sips -z 60  60  AppIcon-512@2x.png --out Icon-20@3x.png >/dev/null
          cat > Contents.json <<'JSON'
          {
            "images" : [
              { "size" : "20x20", "idiom" : "iphone", "filename" : "Icon-20@2x.png", "scale" : "2x" },
              { "size" : "20x20", "idiom" : "iphone", "filename" : "Icon-20@3x.png", "scale" : "3x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "Icon-29@2x.png", "scale" : "2x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "Icon-29@3x.png", "scale" : "3x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "Icon-40@2x.png", "scale" : "2x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "Icon-40@3x.png", "scale" : "3x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "Icon-60@2x.png", "scale" : "2x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "Icon-60@3x.png", "scale" : "3x" },
              { "size" : "1024x1024", "idiom" : "ios-marketing", "filename" : "AppIcon-512@2x.png", "scale" : "1x" }
            ],
            "info" : { "version" : 1, "author" : "xcode" }
          }
          JSON
          echo "=== AppIcon.appiconset contents ==="
          ls -la
          cd - >/dev/null
      - name: Ensure CFBundleIconName in Info.plist
        script: |
          # Belt and suspenders: also force CFBundleIconName into source
          # Info.plist so it's present even if Xcode auto-injection fails.
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST"
          echo "=== Info.plist CFBundleIconName ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST"
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Revoke stale Distribution certs
        script: |
          # Apple enforces a hard limit of 2 Distribution certs per team.
          # Every build generates a fresh RSA key, so existing certs never
          # match and we hit 409 once 2 certs exist. Revoke them up front
          # so fetch-signing-files --create always has room.
          # Safe because we only ship through Codemagic (no local Xcode).
          set +e
          echo "=== app-store-connect cert-related commands ==="
          app-store-connect --help 2>&1 | grep -iE "cert" | head -20 || true
          echo ""
          echo "=== list-certificates --type IOS_DISTRIBUTION (json) ==="
          app-store-connect list-certificates --type IOS_DISTRIBUTION --json > /tmp/certs.json 2>&1
          echo "Exit: $?"
          cat /tmp/certs.json
          echo ""
          echo "=== Parsing IDs ==="
          python3 <<'PYEOF' > /tmp/cert_ids.txt
          import json, sys
          ids = []
          try:
              with open('/tmp/certs.json') as f:
                  raw = f.read()
              data = json.loads(raw)
              if isinstance(data, list):
                  for c in data:
                      if isinstance(c, dict):
                          cid = c.get('id') or c.get('certificateId') or (c.get('attributes') or {}).get('id')
                          if cid:
                              ids.append(cid)
              elif isinstance(data, dict):
                  for c in data.get('data', []):
                      cid = c.get('id')
                      if cid:
                          ids.append(cid)
          except Exception as e:
              print(f"parse error: {e}", file=sys.stderr)
          for i in ids:
              print(i)
          PYEOF
          cat /tmp/cert_ids.txt
          echo ""
          echo "=== Revoking ==="
          while IFS= read -r id; do
            [ -z "$id" ] && continue
            echo "--> Revoking $id"
            yes | app-store-connect delete-certificate "$id" 2>&1 | head -10
            echo "(exit $?)"
          done < /tmp/cert_ids.txt
          set -e
      - name: Fetch signing files
        script: |
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 100))
      - name: Build ipa for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Verify bundle Info.plist & assets
        script: |
          IPA=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -1)
          [ -z "$IPA" ] && { echo "No IPA produced"; exit 1; }
          echo "IPA: $IPA"
          rm -rf /tmp/verify_ipa
          mkdir /tmp/verify_ipa
          cd /tmp/verify_ipa
          unzip -q "$CM_BUILD_DIR/$IPA"
          APP_PLIST=$(ls Payload/*.app/Info.plist | head -1)
          echo "=== Bundle Info.plist CFBundleIconName ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_PLIST" 2>&1 || echo "KEY MISSING"
          echo "=== Bundle Info.plist CFBundleIcons ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons" "$APP_PLIST" 2>&1 || echo "(no CFBundleIcons struct)"
          echo "=== Assets.car in bundle? ==="
          ls -la Payload/*.app/Assets.car 2>&1 | head -5 || echo "NO Assets.car"
          echo "=== All PNGs in bundle root ==="
          ls Payload/*.app/*.png 2>&1 | head -20 || true
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        # Upload to App Store Connect (build becomes available to internal
        # testers, including the developer's own Apple ID, once Apple finishes
        # processing). External beta review submission is OFF — that would
        # require Beta App Information (feedback email, reviewer contact) to
        # be filled in App Store Connect, and we only test internally for now.
        submit_to_testflight: false
      email:
        recipients:
          - arslan.aytac11@gmail.com
        notify:
          success: true
          failure: true
