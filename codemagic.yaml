workflows:
  ios-capacitor-workflow:
    name: Okchu iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Okchu App Store Connect
    environment:
      groups:
        - okchu
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 6762461650
        BUNDLE_ID: "com.arslanaytac.okchu"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Rewrite admob ConsentExecutor for UMP 3.x API
        script: |
          FILE="node_modules/@capacitor-community/admob/ios/Sources/AdMobPlugin/Consent/ConsentExecutor.swift"
          # UMP 3.x dropped the UMP prefix on all types and renamed several
          # members. Rather than chase renames one-by-one via sed, replace the
          # entire file with a UMP 3.x compatible implementation.
          cat > "$FILE" <<'SWIFT_EOF'
          import Foundation
          import Capacitor
          import GoogleMobileAds
          import UserMessagingPlatform

          class ConsentExecutor: NSObject {
              weak var plugin: AdMobPlugin?

              func requestConsentInfo(_ call: CAPPluginCall, _ debugGeography: Int, _ testDeviceIdentifiers: [String], _ tagForUnderAgeOfConsent: Bool) {
                  let parameters = RequestParameters()
                  let debugSettings = DebugSettings()

                  debugSettings.geography = DebugGeography(rawValue: debugGeography) ?? DebugGeography.disabled
                  debugSettings.testDeviceIdentifiers = testDeviceIdentifiers

                  parameters.debugSettings = debugSettings
                  parameters.isTaggedForUnderAgeOfConsent = tagForUnderAgeOfConsent

                  ConsentInformation.shared.requestConsentInfoUpdate(
                      with: parameters,
                      completionHandler: { error in
                          if error != nil {
                              call.reject("Request consent info failed")
                          } else {
                              call.resolve([
                                  "status": self.getConsentStatusString(ConsentInformation.shared.consentStatus),
                                  "isConsentFormAvailable": ConsentInformation.shared.formStatus == FormStatus.available
                              ])
                          }
                      })
              }

              func showConsentForm(_ call: CAPPluginCall) {
                  if let rootViewController = plugin?.getRootVC() {
                      let formStatus = ConsentInformation.shared.formStatus

                      if formStatus == FormStatus.available {
                          ConsentForm.load(with: {form, loadError in
                              if loadError != nil {
                                  call.reject(loadError?.localizedDescription ?? "Load consent form error")
                                  return
                              }

                              if ConsentInformation.shared.consentStatus == ConsentStatus.required {
                                  form?.present(from: rootViewController, completionHandler: { dismissError in
                                      if dismissError != nil {
                                          call.reject(dismissError?.localizedDescription ?? "Consent dismiss error")
                                          return
                                      }

                                      call.resolve([
                                          "status": self.getConsentStatusString(ConsentInformation.shared.consentStatus)
                                      ])
                                  })
                              } else {
                                  call.resolve([
                                      "status": self.getConsentStatusString(ConsentInformation.shared.consentStatus)
                                  ])
                              }
                          })
                      } else {
                          call.reject("Consent Form not available")
                      }
                  } else {
                      call.reject("No ViewController")
                  }
              }

              func resetConsentInfo(_ call: CAPPluginCall) {
                  ConsentInformation.shared.reset()
                  call.resolve()
              }

              func getConsentStatusString(_ consentStatus: ConsentStatus) -> String {
                  switch consentStatus {
                  case ConsentStatus.required:
                      return "REQUIRED"
                  case ConsentStatus.notRequired:
                      return "NOT_REQUIRED"
                  case ConsentStatus.obtained:
                      return "OBTAINED"
                  default:
                      return "UNKNOWN"
                  }
              }
          }
          SWIFT_EOF
          echo "=== Rewrote $FILE ==="
          cat "$FILE"
      - name: Build web assets & sync Capacitor
        script: |
          npm run cap:sync
      - name: Ensure CFBundleIconName in Info.plist
        script: |
          # App Store validation rejects iOS 11+ apps missing CFBundleIconName.
          # Inject it after cap sync so nothing downstream can strip it.
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST"
          echo "=== Info.plist CFBundleIconName ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST"
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 100))
      - name: Build ipa for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - arslan.aytac11@gmail.com
        notify:
          success: true
          failure: true
