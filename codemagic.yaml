workflows:
  ios-capacitor-workflow:
    name: Okchu iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Okchu App Store Connect
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 6762461650
        BUNDLE_ID: "com.arslanaytac.okchu"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Patch admob plugin for UMP 3.x API
        script: |
          FILE="node_modules/@capacitor-community/admob/ios/Sources/AdMobPlugin/Consent/ConsentExecutor.swift"
          # Rename type references (UMP 3.x dropped the UMP prefix on these)
          sed -i '' 's/UMPConsentInformation/ConsentInformation/g' "$FILE"
          sed -i '' 's/UMPConsentStatus/ConsentStatus/g' "$FILE"
          sed -i '' 's/UMPFormStatus/FormStatus/g' "$FILE"
          # sharedInstance was renamed to shared on ConsentInformation
          sed -i '' 's/ConsentInformation\.sharedInstance/ConsentInformation.shared/g' "$FILE"
          # UMPConsentForm.load argument label changed from completionHandler: to with:
          sed -i '' 's/UMPConsentForm\.load(completionHandler:/UMPConsentForm.load(with:/g' "$FILE"
          echo "=== Patched $FILE ==="
          cat "$FILE"
      - name: Build web assets & sync Capacitor
        script: |
          npm run cap:sync
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Generate private key for certificate
        script: |
          ssh-keygen -t rsa -b 2048 -m PEM -f /tmp/cert_key -q -N ""
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 100))
      - name: Build ipa for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - arslan.aytac11@gmail.com
        notify:
          success: true
          failure: true
