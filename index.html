<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f0e4c8">
    <title>Ok Bulmacasi - Antik Yolculuk</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Menu Screen -->
        <div id="screen-menu" class="screen active">
            <h1 class="game-title">Ok Bulmacasi</h1>
            <p class="game-subtitle">Antik Yolculuk</p>
            <button id="btn-play" class="btn btn-primary">Oyna</button>
        </div>

        <!-- Chapter Select Screen -->
        <div id="screen-chapters" class="screen">
            <div class="screen-header">
                <button class="btn-back" id="btn-chapters-back">&larr;</button>
                <h2>Bolumler</h2>
            </div>
            <div id="chapter-list" class="chapter-list"></div>
        </div>

        <!-- Level Select Screen -->
        <div id="screen-levels" class="screen">
            <div class="screen-header">
                <button class="btn-back" id="btn-levels-back">&larr;</button>
                <h2 id="level-screen-title">Seviyeler</h2>
            </div>
            <div id="level-list" class="level-list"></div>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="screen">
            <div class="game-header">
                <button class="btn-back" id="btn-game-back">&larr;</button>
                <div class="level-info">
                    <span id="level-name">Seviye 1</span>
                    <span id="level-difficulty" class="difficulty-badge">Kolay</span>
                </div>
                <span></span>
            </div>
            <div class="game-stats">
                <div id="lives-display" class="lives-display"></div>
                <div class="stat-item"><span class="stat-label">Skor</span><span id="game-score" class="stat-value">0</span></div>
                <div class="stat-item"><span id="game-combo" class="combo-badge"></span></div>
                <div class="stat-item"><span class="stat-label">Hamle</span><span id="game-moves" class="stat-value">0/0</span></div>
                <div class="stat-item"><span class="stat-label">Sure</span><span id="game-timer" class="stat-value">0:00</span></div>
            </div>
            <canvas id="game-canvas"></canvas>
        </div>

        <!-- Level Complete Overlay -->
        <div id="overlay-complete" class="overlay hidden">
            <div class="overlay-content">
                <h2>Tebrikler!</h2>
                <div id="complete-stars" class="stars-display"></div>
                <p id="complete-score" class="complete-score"></p>
                <p id="complete-stats" class="complete-stats"></p>
                <button id="btn-next-level" class="btn btn-primary">Sonraki Seviye</button>
            </div>
        </div>

        <!-- Lives Empty Overlay -->
        <div id="overlay-no-lives" class="overlay hidden">
            <div class="overlay-content">
                <h2>Canin Bitti!</h2>
                <p id="lives-timer-text">Yeni can: --:--</p>
                <button id="btn-watch-ad" class="btn btn-primary">Reklam Izle (+1 Can)</button>
                <button id="btn-wait" class="btn btn-secondary">Bekle</button>
            </div>
        </div>

        <!-- Time Up Overlay -->
        <div id="overlay-time-up" class="overlay hidden">
            <div class="overlay-content">
                <h2>Sure Doldu!</h2>
                <p class="time-up-message">Zamani yetistiremdin</p>
                <button id="btn-retry" class="btn btn-primary">Tekrar Dene</button>
                <button id="btn-time-up-back" class="btn btn-secondary">Bolumler</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js?v=8"></script>
</body>
</html>
